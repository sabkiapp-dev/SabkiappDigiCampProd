[global]
type=global
default_entity_id=asterisk

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060


;============================================




; SIP Trunk to Dinstar GSM Gateway
[1001]
type=endpoint
transport=transport-udp
context=basic-context
disallow=all
allow=ulaw
aors=1001
outbound_auth=1001
direct_media=no
from_user=1001
from_domain=192.168.8.50
callerid=1001 <1001>

[1001]
type=auth
auth_type=userpass
username=1001
password=1001  ; match Dinstar SIP settings

[1001]
type=aor
contact=sip:192.168.8.50

[1001]
type=identify
endpoint=1001
match=192.168.8.50

