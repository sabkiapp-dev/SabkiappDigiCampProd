[basic-context]
exten => _XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX,1,Verbose(1,"User dialed ${EXTEN}")
 same => n,Set(PHONE=${EXTEN:0:10})
 same => n,Set(CALLERID_NUM=${EXTEN:10:4})
 same => n,Set(USER_ID=${EXTEN:14:8})
 same => n,Set(DIALPLAN=${EXTEN:22:10})

 same => n,System(/home/pi/Documents/MachineStatus/dtmf.sh start_dialing ${PHONE} ${CALLERID_NUM} ${DIALPLAN} ${USER_ID} &)

 ; Set channel variables explicitly for U() subroutine
 same => n,Set(__PHONE=${PHONE})
 same => n,Set(__CALLERID_NUM=${CALLERID_NUM})
 same => n,Set(__USER_ID=${USER_ID})
 same => n,Set(__DIALPLAN=${DIALPLAN})

 ; U(context) — variables will be fetched from within the subroutine
 same => n,Dial(PJSIP/${PHONE}@${CALLERID_NUM},${INTERNAL_DIAL_OPT},U(${DIALPLAN}))

 same => n,System(/home/pi/Documents/MachineStatus/dtmf.sh not_answered ${PHONE} ${CALLERID_NUM} ${DIALPLAN} ${USER_ID} ${DIALSTATUS} &)

exten => h,1,System(/home/pi/Documents/MachineStatus/dtmf.sh completed ${PHONE} ${CALLERID_NUM} ${DIALPLAN} ${USER_ID} &)
 same => n,Hangup()

